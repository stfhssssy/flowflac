env_suite: robomimic
env_name: can

obs_dim: 23
cond_steps: 1
action_dim: 7
horizon_steps: 4
act_steps: 4

defaults:
  - _self_

hydra:
  run:
    dir: ${logdir}

_target_: agent.finetune.reinflow.train_flac_flow_agent.TrainFLACFlowAgent

name: ${env_name}_ft_flac_reflow_mlp_random_ta${horizon_steps}_seed${seed}
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}

# First FLAC smoke-test starts from a randomly initialized FlowMLP.
base_policy_path: null
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}.json
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/robomimic/${env_name}/normalization.npz

seed: 42
device: cuda:0

env:
  n_envs: 1
  name: ${env_name}
  best_reward_threshold_for_success: 1
  max_episode_steps: 300
  save_video: false
  wrappers:
    robomimic_lowdim:
      normalization_path: ${normalization_path}
      low_dim_keys: ['robot0_eef_pos',
                     'robot0_eef_quat',
                     'robot0_gripper_qpos',
                     'object']
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: true

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: robomimic-can-flac
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false

train:
  n_train_itr: 151
  n_steps: 300
  n_steps_eval: 300
  n_eval_episode: 5
  batch_size: 256
  replay_size: 1000000
  start_steps: 1000
  updates_per_step: 1
  target_update_interval: 2
  gamma: 0.999
  tau: 0.005
  scale_reward_factor: 1.0
  actor_lr: 3e-4
  actor_weight_decay: 0
  critic_lr: 3e-4
  critic_weight_decay: 0
  alpha_lr: 3e-5
  target_kinetic_coef: 2.5
  init_log_alpha: -2.0
  auto_alpha: true
  skip_initial_eval: true
  save_model_freq: 50
  val_freq: 10
  log_freq: 1
  render:
    freq: 10
    num: 0

model:
  _target_: model.flow.ft_flac.flac_flow.FLACFlow
  device: ${device}
  actor_policy_path: ${base_policy_path}
  inference_steps: 1
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  act_min: -1
  act_max: 1
  randn_clip_value: null
  clip_intermediate_actions: true
  integration_method: euler
  use_zero_noise_for_deterministic: false
  distributional_critic: false
  critic_num_atoms: 101
  critic_v_min: -150.0
  critic_v_max: 150.0

  actor:
    _target_: model.flow.mlp_flow.FlowMLP
    time_dim: 32
    mlp_dims: [512, 512, 512]
    residual_style: true
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}

  critic:
    _target_: model.common.critic.CriticObsAct
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    action_dim: ${action_dim}
    action_steps: ${horizon_steps}
    mlp_dims: [256, 256, 256]
    activation_type: Mish
    residual_tyle: true
    double_q: true
    output_dim: 1
