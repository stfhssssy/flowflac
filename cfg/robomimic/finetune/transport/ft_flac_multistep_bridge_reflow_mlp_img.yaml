env_suite: robomimic
env_name: transport

obs_dim: 18
cond_steps: 1
img_cond_steps: 1
action_dim: 14
horizon_steps: 8
act_steps: 8

defaults:
  - _self_

hydra:
  run:
    dir: ${logdir}

_target_: agent.finetune.reinflow.train_flac_bridge_flow_img_agent.TrainFLACBridgeImgFlowAgent

name: ${env_name}_ft_flac_multistep_bridge_reflow_mlp_img_ta${horizon_steps}_seed${seed}
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}

base_policy_path: ${oc.env:REINFLOW_LOG_DIR}/robomimic/pretrain/transport/transport_pre_reflow_mlp_img_ta8_td100/2026-05-22_22-58-35_42/checkpoint/state_2000.pt
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}-img.json
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/robomimic/${env_name}-img/normalization.npz

seed: 42
device: cuda:0
sim_device: cuda:1

shape_meta:
  obs:
    rgb:
      shape: [6, 96, 96]
    state:
      shape: [18]
  action:
    shape: [14]

env:
  n_envs: 4
  asynchronous: true
  async_context: spawn
  async_shared_memory: false
  async_daemon: false
  render_gpu_devices: [0, 1]
  name: ${env_name}
  best_reward_threshold_for_success: 1
  max_episode_steps: 800
  save_video: false
  use_image_obs: true
  wrappers:
    robomimic_image:
      normalization_path: ${normalization_path}
      low_dim_keys:
        - robot0_eef_pos
        - robot0_eef_quat
        - robot0_gripper_qpos
        - robot1_eef_pos
        - robot1_eef_quat
        - robot1_gripper_qpos
      image_keys:
        - shouldercamera0_image
        - shouldercamera1_image
      shape_meta: ${shape_meta}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: true

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: robomimic-transport-flac
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false

train:
  n_train_itr: 151
  n_steps: 75
  n_steps_eval: 800
  n_eval_episode: 20
  force_train: false
  batch_size: 64
  replay_size: 20000
  start_steps: 0
  update_after_steps: 75001
  actor_update_after_steps: 75001
  updates_per_step: 1
  actor_update_interval: 20
  target_update_interval: 2
  gamma: 0.999
  tau: 0.005
  scale_reward_factor: 1.0
  actor_lr: 1e-6
  actor_weight_decay: 0
  actor_max_grad_norm: 0.0
  critic_lr: 3e-4
  critic_weight_decay: 0
  critic_max_grad_norm: 1.0
  alpha_lr: 1e-5
  target_kinetic_mode: fixed
  target_kinetic: 0.01
  target_bridge_energy: 0.002
  measure_kinetic_steps: 0
  init_log_alpha: 4.0
  auto_alpha: true
  actor_q_coef: 1.0
  bc_anchor_coef: 0.0
  bc_anchor_decay: none
  base_policy_warmup_steps: 75000
  base_policy_warmup_noise: 0.03
  exploration_noise: 0.01
  skip_initial_eval: false
  save_model_freq: 50
  val_freq: 10
  log_freq: 1
  render:
    freq: 10
    num: 0

model:
  _target_: model.flow.ft_flac.flac_multistep_bridge_flow.FLACMultiStepBridgeFlow
  device: ${device}
  actor_policy_path: ${base_policy_path}
  inference_steps: 1
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  act_min: -1
  act_max: 1
  randn_clip_value: 3.0
  clip_intermediate_actions: true
  final_squash: clamp
  integration_method: euler
  use_zero_noise_for_deterministic: false
  distributional_critic: false
  critic_num_atoms: 101
  critic_v_min: -150.0
  critic_v_max: 150.0
  bridge_hidden_dim: 256
  bridge_steps: 4
  bridge_time_dim: 32
  bridge_velocity_scale: 0.2

  actor:
    _target_: model.flow.mlp_flow.VisionFlowMLP
    backbone:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      num_channel: ${eval:'3 * ${img_cond_steps}'}
      img_h: ${shape_meta.obs.rgb.shape[1]}
      img_w: ${shape_meta.obs.rgb.shape[2]}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    augment: false
    num_img: 2
    spatial_emb: 128
    time_dim: 32
    mlp_dims: [768, 768, 768]
    residual_style: true
    img_cond_steps: ${img_cond_steps}
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}

  critic:
    _target_: model.common.critic.ViTCriticObsAct
    spatial_emb: 128
    augment: false
    num_img: 2
    backbone:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      num_channel: ${eval:'3 * ${img_cond_steps}'}
      img_h: ${shape_meta.obs.rgb.shape[1]}
      img_w: ${shape_meta.obs.rgb.shape[2]}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    img_cond_steps: ${img_cond_steps}
    mlp_dims: [256, 256, 256]
    activation_type: Mish
    residual_tyle: true
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    action_dim: ${action_dim}
    action_steps: ${horizon_steps}
    double_q: true
    output_dim: 1
