env_suite: libero
env_name: libero90_task57

obs_dim: 8
action_dim: 7
horizon_steps: 50
act_steps: 20

defaults:
  - _self_

hydra:
  run:
    dir: ${logdir}

_target_: agent.finetune.reinflow.train_pi0_libero_bridge_agent.TrainPi0LiberoBridgeAgent

name: pi0_libero90_task57_dsrl_bridge_s${model.bridge_steps}_seed${seed}
logdir: ${oc.env:REINFLOW_LOG_DIR}/libero/finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}

seed: 42
device: cuda:0
sim_device: cuda:0

env:
  suite: libero_90
  task_id: 57
  render_resolution: 256
  image_size: 64
  max_timesteps: 400
  max_reward: 1.0

pi0:
  openpi_root: /home/ssy/ReinFlow/openpi
  config_name: pi0_libero
  checkpoint_dir: s3://openpi-assets/checkpoints/pi0_libero
  deterministic_eval: false

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY,null}
  project: libero-pi0-bridge
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false

train:
  n_train_itr: 5001
  n_eval_episode: 10
  batch_size: 256
  replay_size: 50000
  start_online_updates: 500
  updates_per_step: 20
  actor_update_interval: 1
  target_update_interval: 1
  gamma: 0.999
  tau: 0.005
  actor_lr: 1e-4
  actor_weight_decay: 0
  actor_max_grad_norm: 1.0
  critic_lr: 3e-4
  critic_weight_decay: 0
  critic_max_grad_norm: 1.0
  alpha_lr: 3e-5
  init_log_alpha: 4.0
  auto_alpha: true
  target_bridge_energy: 0.003
  actor_q_coef: 1.0
  exploration_noise: 0.01
  save_model_freq: 50
  val_freq: 10
  log_freq: 1

model:
  _target_: model.flow.ft_flac.pi0_libero_bridge_flow.Pi0LiberoDSRLBridgeFlow
  device: ${device}
  image_latent_dim: 50
  state_dim: ${obs_dim}
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  bridge_steps: 4
  bridge_hidden_dim: 256
  bridge_time_dim: 32
  bridge_velocity_scale: 0.2
  bridge_noise_condition_scale: 1.0
  critic_hidden_dim: 256
  act_min: -1
  act_max: 1

